function getStat(dataset,q){
  try{
    return JSON.parse(
      localStorage.getItem(keyName(dataset,q)) ||
      '{"correct":0,"wrong":0,"memory":0,"last":"","lastDate":"","fav":false}'
    );
  }catch(e){
    return {
      correct:0,
      wrong:0,
      memory:0,
      last:"",
      lastDate:"",
      fav:false
    };
  }
}

function setStat(dataset,q,obj){
    localStorage.setItem(keyName(dataset,q),JSON.stringify(obj));
}

function shuffle(a){
    for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
}

function todayStr(){
    const d=new Date();
    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,"0");
    const da=String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${da}`;
}

function diffDays(dateStr){
    if(!dateStr)return 9999;
    const t1=new Date(dateStr);
    const t2=new Date(todayStr());
    return Math.floor((t2-t1)/(1000*60*60*24));
}

/* load */
async function loadSheet(){

    const ds=DATASETS[$("dataset").value||0];

    const url=
    "https://docs.google.com/spreadsheets/d/"
    +ds.id+
    "/gviz/tq?sheet="+encodeURIComponent(ds.sheet);

    const txt=await (await fetch(url)).text();

    const m=txt.match(/setResponse\((.*)\);/s);
    const json=JSON.parse(m[1]);

    data=(json.table.rows||[]).map(r=>{

    const c=r.c||[];

    const q=c[0]&&c[0].v!=null?String(c[0].v).trim():"";
    const raw=c[2]&&c[2].v!=null?String(c[2].v):"";

    const normalized=raw.replace(/\\n/g,"\n");
    const lines=normalized.split("\n");

    const a=(lines.shift()||"").trim();
    const e=lines.join("\n").trim();

    return {q,a,e};

    }).filter(x=>x.q&&x.a);
}

/* queue */
function buildQueue(){

    const ds = DATASETS[$("dataset").value||0];

    const filterValue = $("memoryFilter").value || "0";

    let memoryLimit = 0;
    let mode = "all";

    /* 数値なら定着度フィルタ */
    if(!isNaN(Number(filterValue))){
    memoryLimit = Number(filterValue);
    }else{
    mode = filterValue;
    }

    let target = data.filter(x=>{

    const s = getStat(ds.name,x.q);

    /* 定着度条件 */
    if(s.memory < memoryLimit) return false;

    switch(mode){

      case "correct":
        return s.last==="correct";

      case "wrong":
        return s.last==="wrong";

      case "unseen":
        return s.correct===0 && s.wrong===0;

      case "old30":
        return diffDays(s.lastDate)>=30;

      case "old14":
        return diffDays(s.lastDate)>=14;

      case "old7":
        return diffDays(s.lastDate)>=7;

      case "fav":
        return s.fav===true;
    }

    return true;
  });

  if(target.length===0){

    queue=[];
    $("left").textContent="0";
    $("question").textContent="";
    $("answer").textContent="";
    $("exp").textContent="";
    $("status").textContent="対象問題なし";

    return;
  }

  /* 重み付きランダム */
  queue=[];
  let pool=[...target];

  while(pool.length){

    const weights=pool.map(x=>{

      const s=getStat(ds.name,x.q);

      let w=Math.max(1,s.memory);

      if(s.fav) w+=25;

      return w;
    });

    const total=
      weights.reduce((a,b)=>a+b,0);

    let r=Math.random()*total;

    let pick=0;

    for(let i=0;i<weights.length;i++){
      r-=weights[i];
      if(r<=0){
        pick=i;
        break;
      }
    }

    queue.push(pool[pick]);
    pool.splice(pick,1);
  }

  $("left").textContent=queue.length;
}

function showAnswer(){

/* hit */
function hit(ok){

    if(!cur||gameOver)return;

    const ds=DATASETS[$("dataset").value||0];
    let s=getStat(ds.name,cur.q);

    if(ok){

        laser();

        score += 100;
        s.correct++;

        /* 残り時間が多いほど定着している */
        const bonus = Math.floor(remain * 4);

        /* 早答えほど大きく下げる */
        s.memory = Math.max(
            1,
            s.memory - (8 + bonus)
        );

        s.last="correct";

        $("status").textContent="撃破 +100";

        addDailyCorrect();

    }else{

        hp--;                    /* ←これが抜けていた */
        $("hp").textContent=hp;

        s.wrong++;

        /* 不正解で大幅増加 */
        s.memory += 18;

        s.last="wrong";

        $("status").textContent="被弾!";

        addDailyWrong();

        if(hp<=0){

            gameOver=true;

            $("hp").textContent=0;
            $("question").textContent="GAME OVER";
            $("answer").textContent="";
            $("exp").textContent="";
            $("status").textContent="STARTで再挑戦";

            setStat(ds.name,cur.q,s);
            return;
        }
    }

    s.lastDate=todayStr();

    setStat(ds.name,cur.q,s);

    $("score").textContent=score;
    $("hp").textContent=hp;

    setTimeout(nextQuestion,550);

    /* 正解時 */
    addDailyCorrect();

    /* 不正解時 */
    addDailyWrong();
}

/* 統計 */
function drawStats(){

    $("statsWrap").style.display="block";

    const ds=DATASETS[$("dataset").value||0];

    let correct=0,wrong=0,unseen=0;

    data.forEach(x=>{
    const s=getStat(ds.name,x.q);
    correct+=s.correct;
    wrong+=s.wrong;
    if(s.correct===0&&s.wrong===0)unseen++;
    });

    const cvs=$("chart");
    const ctx=cvs.getContext("2d");
    ctx.clearRect(0,0,cvs.width,cvs.height);

    const vals=[correct,wrong,unseen];
    const cols=["#22c55e","#ef4444","#3b82f6"];
    const total=Math.max(correct+wrong+unseen,1);

    let start=-Math.PI/2;

    vals.forEach((v,i)=>{
    const ang=v/total*Math.PI*2;

    ctx.beginPath();
    ctx.moveTo(120,120);
    ctx.fillStyle=cols[i];
    ctx.arc(120,120,90,start,start+ang);
    ctx.fill();

    start+=ang;
    });

    ctx.fillStyle="#111";
    ctx.font="16px sans-serif";
    ctx.fillText("正解 "+correct,250,70);
    ctx.fillText("不正解 "+wrong,250,100);
    ctx.fillText("未出題 "+unseen,250,130);

    const mode=$("sortMode").value;

    const rows=[...data];

    rows.sort((a,b)=>{

    const sa = getStat(ds.name,a.q);
    const sb = getStat(ds.name,b.q);

    switch(mode){

        case "correct_desc":
        return sb.correct - sa.correct;

        case "correct_asc":
        return sa.correct - sb.correct;

        case "wrong_desc":
        return sb.wrong - sa.wrong;

        case "wrong_asc":
        return sa.wrong - sb.wrong;

        case "memory_desc":
        return sb.memory - sa.memory;

        case "memory_asc":
        return sa.memory - sb.memory;

        /* ▼ 修正版：日付文字列比較ではなく Date比較 */
        case "date_desc":
        return new Date(sb.lastDate || "1900-01-01")
            - new Date(sa.lastDate || "1900-01-01");

        case "date_asc":
        return new Date(sa.lastDate || "1900-01-01")
            - new Date(sb.lastDate || "1900-01-01");
    }

    return 0;
    });
    


    $("list").innerHTML = rows.map(x=>{

    const s=getStat(ds.name,x.q);

    return `
    <div class="row">
        <b>${escapeHtml(x.q)}</b><br>

        定着:${s.memory}
        正:${s.correct}
        誤:${s.wrong}
        最終:${s.lastDate||"-"}

        <br><br>

        <button
        onclick="toggleFav('${encodeURIComponent(x.q)}')"
        class="misc">

        ${s.fav ? "★解除" : "☆お気に入り"}

        </button>
    </div>
    `;
    }).join("");


    drawDailyChart();
}


function toggleFav(encodedQ){

  const ds = DATASETS[$("dataset").value||0];

function escapeHtml(str){
    return str
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

/* 今日の日付 */
function todayStr(){
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const da=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${da}`;
}

/* 初回アクセス時だけ保存 */
function initDailyRecord(){

  const key="daily_visit_"+todayStr();

  if(localStorage.getItem(key)) return;

  localStorage.setItem(
    key,
    JSON.stringify({
      correct:0,
      wrong:0
    })
  );
}

/* 正解加算 */
function addDailyCorrect(){

  const key="daily_visit_"+todayStr();

  let d=JSON.parse(localStorage.getItem(key));

  d.correct++;

  localStorage.setItem(key,JSON.stringify(d));
}

/* 不正解加算 */
function addDailyWrong(){

  const key="daily_visit_"+todayStr();

  let d=JSON.parse(localStorage.getItem(key));

  d.wrong++;

  localStorage.setItem(key,JSON.stringify(d));
}


function drawDailyChart(){

 const cvs=$("dailyChart");
 const ctx=cvs.getContext("2d");

 ctx.clearRect(0,0,cvs.width,cvs.height);

 const keys=Object.keys(localStorage)
 .filter(k=>k.startsWith("daily_visit_"))
 .sort();

 const rows=keys.map(k=>{
   return {
     date:k.replace("daily_visit_",""),
     ...JSON.parse(localStorage.getItem(k))
   };
 });

 if(rows.length===0)return;

 const max=Math.max(
   ...rows.map(x=>Math.max(x.correct,x.wrong)),
   1
 );

 const W=760;
 const H=220;
 const sx=60;
 const sy=260;

 /* 軸 */
 ctx.strokeStyle="#333";
 ctx.lineWidth=1;

 ctx.beginPath();
 ctx.moveTo(sx,20);
 ctx.lineTo(sx,sy);
 ctx.lineTo(sx+W,sy);
 ctx.stroke();


 function drawLine(type,color){

   ctx.beginPath();
   ctx.strokeStyle=color;
   ctx.lineWidth=3;

   rows.forEach((r,i)=>{

     const x=sx+i*(W/Math.max(rows.length-1,1));
     const y=sy-(r[type]/max)*H;

     if(i===0) ctx.moveTo(x,y);
     else ctx.lineTo(x,y);

   });

   ctx.stroke();

   /* プロット */
   rows.forEach((r,i)=>{

     const x=sx+i*(W/Math.max(rows.length-1,1));
     const y=sy-(r[type]/max)*H;

     ctx.beginPath();
     ctx.fillStyle=color;
     ctx.arc(x,y,5,0,Math.PI*2);
     ctx.fill();

   });
 }

 /* 正解 緑 */
 drawLine("correct","#22c55e");

 /* 不正解 赤 */
 drawLine("wrong","#ef4444");


 /* 日付 */
 ctx.fillStyle="#111";
 ctx.font="12px sans-serif";

 rows.forEach((r,i)=>{

   const x=sx+i*(W/Math.max(rows.length-1,1));

   ctx.fillText(
     r.date.slice(5),
     x-18,
     282
   );

 });

 ctx.fillText("緑=正解数",620,28);
 ctx.fillText("赤=不正解数",620,48);

}


let remain=5;
let timerStart=0;

function startTimer(){


  $("centerTimer").textContent =
    remain.toFixed(2);

  fitText($("centerTimer"),92,26);

  clearInterval(intv);

  remain = 5;
  timerStart = Date.now();

  $("centerTimer").textContent = "5.00";

  intv = setInterval(()=>{

    const diff = (Date.now() - timerStart) / 1000;
    remain = Math.max(0, 5 - diff);

    $("centerTimer").textContent =
      remain.toFixed(2);

    if(remain <= 0){
      showAnswer();
    }

  },10);
}


function fitText(el,maxSize,minSize){

  if(!el) return;

  /* 一旦非表示 */
  el.style.visibility="hidden";
  el.style.fontSize=maxSize+"px";

  let size=maxSize;

  while(
    size>minSize &&
    (
      el.scrollHeight > el.clientHeight ||
      el.scrollWidth  > el.clientWidth
    )
  ){
    size--;
    el.style.fontSize=size+"px";
  }

  /* 最終サイズ確定後に表示 */
  el.style.fontSize=size+"px";
  el.style.visibility="visible";
}


function resizeAllTexts(){

  fitText($("question"),52,14);
  fitText($("answer"),42,12);
  fitText($("centerTimer"),40,40);

  $("exp").style.fontSize="28px";
}
