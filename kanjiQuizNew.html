<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Memory Shooting V3 Deluxe</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#67c8ff}
#game{position:relative;width:100%;height:100%;background:linear-gradient(#7dd3fc,#1d4ed8 65%,#1e293b);color:#fff}
.cloud{position:absolute;background:rgba(255,255,255,.8);border-radius:999px;filter:blur(2px);animation:float 30s linear infinite}.cloud:before,.cloud:after{content:'';position:absolute;background:inherit;border-radius:999px}
.cloud:before{width:60%;height:80%;left:10%;top:-20px}.cloud:after{width:50%;height:70%;right:10%;top:-10px}
#enemy{position:absolute;top:-80px;left:50%;transform:translateX(-50%);font-size:72px;animation:drop 5s linear forwards;filter:drop-shadow(0 8px 10px rgba(0,0,0,.3))}
#question{position:absolute;top:18%;left:50%;transform:translateX(-50%);font-size:clamp(28px,5vw,54px);font-weight:900;text-shadow:0 4px 10px rgba(0,0,0,.35);padding:10px 20px}
#answer{position:absolute;top:34%;left:50%;transform:translateX(-50%);font-size:clamp(22px,4vw,42px);font-weight:800;color:#fff176;text-shadow:0 3px 8px rgba(0,0,0,.5)}
#exp{position:absolute;top:44%;left:50%;transform:translateX(-50%);width:min(90%,820px);text-align:center;font-size:clamp(16px,2.5vw,28px);line-height:1.5;text-shadow:0 2px 6px rgba(0,0,0,.45);white-space:pre-wrap}
#hud{position:absolute;right:12px;bottom:12px;text-align:right;font-weight:800;font-size:18px;background:rgba(0,0,0,.25);padding:12px 14px;border-radius:18px;backdrop-filter:blur(6px)}
#topHud{position:absolute;left:12px;top:12px;font-size:20px;font-weight:900;background:rgba(0,0,0,.2);padding:10px 14px;border-radius:16px}
#controls{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:min(96%,900px)}
button{border:0;border-radius:999px;padding:14px 18px;font-size:16px;font-weight:900;color:#fff;box-shadow:0 8px 18px rgba(0,0,0,.25)}
.start{background:#2563eb}.show{background:#64748b}.ok{background:#22c55e}.ng{background:#ef4444}
.flash{animation:flash .35s}.boom{animation:boom .6s forwards}.laser{position:absolute;bottom:80px;left:50%;width:8px;height:0;background:#fff;box-shadow:0 0 18px #fff,0 0 30px #38bdf8;transform:translateX(-50%);animation:laser .35s forwards}
#status{position:absolute;left:50%;top:8%;transform:translateX(-50%);font-size:28px;font-weight:900;text-shadow:0 3px 8px rgba(0,0,0,.4)}
@keyframes drop{from{top:-80px}to{top:70%}}
@keyframes boom{0%{transform:translateX(-50%) scale(1)}100%{transform:translateX(-50%) scale(2.6);opacity:0}}
@keyframes laser{0%{height:0}100%{height:70%;bottom:80px}}
@keyframes flash{0%,100%{filter:none}50%{filter:brightness(1.5)}}
@keyframes float{from{transform:translateX(-20vw)}to{transform:translateX(120vw)}}
</style>
</head>
<body>
<div id='game'>
<div class='cloud' style='width:120px;height:50px;top:10%;left:-20%;animation-duration:35s'></div>
<div class='cloud' style='width:180px;height:70px;top:24%;left:-30%;animation-duration:48s'></div>
<div class='cloud' style='width:140px;height:60px;top:40%;left:-25%;animation-duration:40s'></div>
<div id='topHud'>⏱ <span id='timer'>5</span>　❤️ <span id='hp'>3</span></div>
<div id='status'>READY</div>
<div id='enemy'>👾</div>
<div id='question'>START!</div>
<div id='answer'></div>
<div id='exp'></div>
<div id='hud'>⭐ SCORE <span id='score'>0</span><br>📚 LEFT <span id='left'>0</span></div>
<div id='controls'>
<button class='start' id='start'>START</button>
<button class='show' id='show'>答え</button>
<button class='ok' id='correct'>撃破</button>
<button class='ng' id='wrong'>被弾</button>
</div>
</div>
<script>
const DEFAULT_SHEET_ID='1RDOTC8POyzmq4WztOa4PrI8lXa6R04GkNqovCfHEd_M';
const DEFAULT_SHEET_NAME='シート1';
let data=[],queue=[],cur=null,timer=5,intv=null,score=0,hp=3;
const $=id=>document.getElementById(id);
function k(q){return 'stat_'+q}
function gs(q){try{return JSON.parse(localStorage.getItem(k(q))||'{"correct":0,"wrong":0,"memory":0,"last":""}')}catch(e){return {correct:0,wrong:0,memory:0,last:''}}}
function ss(q,s){localStorage.setItem(k(q),JSON.stringify(s))}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
async function load(){const url='https://docs.google.com/spreadsheets/d/'+DEFAULT_SHEET_ID+'/gviz/tq?sheet='+encodeURIComponent(DEFAULT_SHEET_NAME);const txt=await (await fetch(url)).text();const m=txt.match(/setResponse\((.*)\);/s);const j=JSON.parse(m[1]);data=(j.table.rows||[]).map(r=>{const c=r.c||[];const q=c[0]&&c[0].v!=null?String(c[0].v).trim():'';const raw=c[2]&&c[2].v!=null?String(c[2].v):'';const norm=raw.replace(/\\n/g,'\n').replace(/\r\n/g,'\n').replace(/\r/g,'\n');const parts=norm.split('\n');const a=(parts.shift()||'').trim();const e=parts.join('\n').trim();return {q,a,e};}).filter(x=>x.q&&x.a);}
function build(){const unseen=data.filter(x=>{const s=gs(x.q);return s.correct===0&&s.wrong===0;});const seen=data.filter(x=>{const s=gs(x.q);return !(s.correct===0&&s.wrong===0);});shuffle(unseen);seen.sort((a,b)=>gs(a.q).memory-gs(b.q).memory);queue=[...unseen,...seen];$('left').textContent=queue.length;}
function next(){clearInterval(intv);if(queue.length===0){$('status').textContent='🏆 CLEAR!';$('question').textContent='MISSION COMPLETE';$('enemy').style.display='none';return;}cur=queue.shift();$('left').textContent=queue.length+1;$('enemy').style.display='block';$('enemy').className='';$('enemy').id='enemy';$('question').textContent=cur.q;$('answer').textContent='';$('exp').textContent='';$('status').textContent='THINK!';timer=5;$('timer').textContent='5';$('enemy').style.animation='none';void $('enemy').offsetWidth;$('enemy').style.animation='drop 5s linear forwards';intv=setInterval(()=>{timer--; $('timer').textContent=timer; if(timer<=0)show();},1000)}
function show(){clearInterval(intv);if(!cur)return;$('answer').textContent=cur.a;$('exp').textContent=cur.e||'解説なし';$('status').textContent='JUDGE!';}
function laser(){const l=document.createElement('div');l.className='laser';$('game').appendChild(l);setTimeout(()=>l.remove(),350)}
function hit(ok){if(!cur)return;let s=gs(cur.q);if(ok){laser();score+=100;s.correct++;s.memory+=10;s.last='correct';$('enemy').className='boom';$('status').textContent='撃破 +100';}else{hp--;s.wrong++;s.memory=Math.max(0,s.memory-15);s.last='wrong';$('game').classList.add('flash');setTimeout(()=>$('game').classList.remove('flash'),350);$('status').textContent='被弾!';if(hp<=0){$('hp').textContent='0';$('question').textContent='GAME OVER';clearInterval(intv);return;}}ss(cur.q,s);$('score').textContent=score;$('hp').textContent=hp;setTimeout(next,700)}
$('start').onclick=async()=>{score=0;hp=3;$('score').textContent='0';$('hp').textContent='3';$('status').textContent='LOADING...';await load();build();next();};
$('show').onclick=show;$('correct').onclick=()=>hit(true);$('wrong').onclick=()=>hit(false);
</script>
</body>
</html>
