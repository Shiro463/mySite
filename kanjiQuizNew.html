<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Memory Shooting V2</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#14213d,#020617);color:#fff;overflow-x:hidden} .wrap{max-width:900px;margin:auto;padding:12px}.panel{background:rgba(255,255,255,.08);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:14px;margin:10px 0;box-shadow:0 10px 30px rgba(0,0,0,.35)} h1{text-align:center;margin:8px 0;font-size:28px}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{text-align:center;padding:10px;border-radius:16px;background:rgba(255,255,255,.08)} .arena{position:relative;height:260px;border-radius:22px;background:linear-gradient(#0f172a,#111827);overflow:hidden}.enemy{position:absolute;top:-60px;left:50%;transform:translateX(-50%);font-size:54px;animation:drop 5s linear forwards}.blast{animation:boom .5s ease-out}.question{position:absolute;bottom:12px;left:12px;right:12px;text-align:center;font-size:28px;font-weight:700}.ans{font-size:24px;text-align:center;min-height:40px}.exp{white-space:pre-wrap;color:#cbd5e1}.row{display:flex;gap:8px;flex-wrap:wrap}.btn{flex:1;padding:14px;border:0;border-radius:16px;font-size:16px;font-weight:700;color:#fff}.b1{background:#2563eb}.b2{background:#475569}.b3{background:#16a34a}.b4{background:#dc2626} input{width:100%;padding:10px;border-radius:12px;border:1px solid #475569;background:#0f172a;color:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}@keyframes drop{from{top:-60px}to{top:180px}}@keyframes boom{0%{transform:translateX(-50%) scale(1)}100%{transform:translateX(-50%) scale(2);opacity:0}}@media(max-width:700px){.hud{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.question{font-size:22px}}
</style>
</head>
<body><div class='wrap'>
<h1>🚀 Memory Shooting V2</h1>
<div class='panel grid'>
<input id='sheetId' placeholder='GoogleスプレッドシートID'>
<input id='sheetName' placeholder='シート名 (Sheet1)'>
</div>
<div class='panel hud'>
<div class='stat'>⏱<div id='timer'>5</div></div>
<div class='stat'>⭐<div id='score'>0</div></div>
<div class='stat'>❤️<div id='hp'>3</div></div>
<div class='stat'>📚<div id='left'>0</div></div>
</div>
<div class='panel arena' id='arena'>
<div class='enemy' id='enemy'>👾</div>
<div class='question' id='question'>START!</div>
</div>
<div class='panel ans' id='answer'></div>
<div class='panel exp' id='exp'></div>
<div class='panel row'>
<button class='btn b1' id='start'>出題開始</button>
<button class='btn b2' id='show'>答えを見る</button>
<button class='btn b3' id='correct'>撃破(正解)</button>
<button class='btn b4' id='wrong'>被弾(不正解)</button>
</div>
<div class='panel' id='status'>準備完了</div>
</div>
<script>
const DEFAULT_SHEET_ID='YOUR_SHEET_ID';
const DEFAULT_SHEET_NAME='Sheet1';
let data=[],queue=[],cur=null,timer=5,intv=null,score=0,hp=3;
const $=x=>document.getElementById(x);
$('sheetId').value=DEFAULT_SHEET_ID;$('sheetName').value=DEFAULT_SHEET_NAME;
function statKey(q){return 'stat_'+q}
function getS(q){try{return JSON.parse(localStorage.getItem(statKey(q))||'{"correct":0,"wrong":0,"memory":0,"last":""}')}catch(e){return {correct:0,wrong:0,memory:0,last:''}}}
function setS(q,s){localStorage.setItem(statKey(q),JSON.stringify(s))}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
async function load(){const id=$('sheetId').value.trim();const sh=$('sheetName').value.trim()||DEFAULT_SHEET_NAME;const url='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?sheet='+encodeURIComponent(sh);const t=await (await fetch(url)).text();const m=t.match(/setResponse\((.*)\);/s);if(!m)throw new Error('読込失敗');const j=JSON.parse(m[1]);const rows=(j.table&&j.table.rows)||[];data=rows.map(r=>{const c=r.c||[];const q=c[0]&&c[0].v!=null?String(c[0].v).trim():'';const raw=c[2]&&c[2].v!=null?String(c[2].v):'';const norm=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n');const idx=norm.indexOf('\n');const a=(idx>=0?norm.slice(0,idx):norm).trim();const e=(idx>=0?norm.slice(idx+1):'').trim();return {q,a,e};}).filter(x=>x.q&&x.a);}
function build(){const unseen=data.filter(x=>{const s=getS(x.q);return s.correct===0&&s.wrong===0;});const seen=data.filter(x=>{const s=getS(x.q);return !(s.correct===0&&s.wrong===0);});shuffle(unseen);seen.sort((a,b)=>getS(a.q).memory-getS(b.q).memory);queue=[...unseen,...seen];$('left').textContent=queue.length;}
function next(){clearInterval(intv);if(queue.length===0){$('question').textContent='🏆 CLEAR!';$('answer').textContent='';$('exp').textContent='';$('status').textContent='全問題終了';return;}cur=queue.shift();$('left').textContent=queue.length+1;$('question').textContent=cur.q;$('answer').textContent='';$('exp').textContent='';$('enemy').className='enemy';timer=5;$('timer').textContent='5';intv=setInterval(()=>{timer--;$('timer').textContent=String(timer);if(timer<=0)show();},1000);}
function show(){clearInterval(intv);if(!cur)return;$('answer').textContent='答え：'+cur.a;$('exp').textContent=cur.e||'解説なし';}
function hit(ok){if(!cur)return;let s=getS(cur.q);if(ok){score+=100;s.correct++;s.memory+=10;s.last='correct';$('enemy').className='enemy blast';$('status').textContent='撃破！ +100';}else{hp--;s.wrong++;s.memory=Math.max(0,s.memory-15);s.last='wrong';$('status').textContent='被弾！';if(hp<=0){$('hp').textContent='0';$('question').textContent='💀 GAME OVER';clearInterval(intv);return;}}setS(cur.q,s);$('score').textContent=String(score);$('hp').textContent=String(hp);setTimeout(next,450);}
$('start').onclick=async()=>{try{score=0;hp=3;$('score').textContent='0';$('hp').textContent='3';$('status').textContent='読込中...';await load();build();next();$('status').textContent='START!';}catch(e){$('status').textContent=e.message;}};
$('show').onclick=show;$('correct').onclick=()=>hit(true);$('wrong').onclick=()=>hit(false);
</script></body></html>
