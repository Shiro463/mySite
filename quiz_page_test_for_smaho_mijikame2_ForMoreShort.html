<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クイズアプリ（スマホ最適化版）</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    scroll-behavior: smooth;
    padding-bottom: 100px; /* localstorage-block の高さ分を確保 */
  }
  /* ---------------- クイズブロック ---------------- */
  .quiz-block {
    display: flex;
    flex-direction: column;
    padding: 10px;
    gap: 10px;
  }

  .quiz-container {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .title {
    color: #6cb4e4;
    text-align: center;
    padding: 0.5em;
    border-top: 2px solid #6cb4e4;
    border-bottom: 2px solid #6cb4e4;
    background: repeating-linear-gradient(-45deg, #f0f8ff, #f0f8ff 3px, #e9f4ff 3px, #e9f4ff 7px);
    font-size: 22px;
  }

  /* ---------------- 問題・答えエリア ---------------- */
  .question-area, .answer-area {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 12px;
      font-size: 18px;
      height: 100px;       /* 固定高さを指定 */
      line-height: 1.5;
      background: #fafafa;
      overflow-y: auto;    /* 縦方向にスクロール可能 */
      white-space: pre-wrap;
      margin: 2px
  }
  #questionArea-3{
      height: 400px;       /* 固定高さを指定 */
  }
  #questionArea-4{
      height: 300px;       /* 固定高さを指定 */
  }

  select {
    font-size: 16px;
    padding: 5px 6px;
  }


  .myLabel{
    margin: 2px;
  }

  .button-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end; /* 右寄せ */
  }

  .myButtonBlue, .myButtonGreen, .myButtonRed {
    font-size: 18px;
    padding: 0.4em 0.8em;
    border-radius: 5px;
    border: 2px solid;
    cursor: pointer;
    transition: 0.3s;
  }

  .myButtonBlue { color: #67c5ff; border-color: #67c5ff; }
  .myButtonBlue:hover { background: #67c5ff; color: white; }
  .myButtonGreen { color: #76ff67; border-color: #76ff67; }
  .myButtonGreen:hover { background: #76ff67; color: white; }
  .myButtonRed { color: #ff6767; border-color: #ff6767; }
  .myButtonRed:hover { background: #ff6767; color: white; }


  .myYellowButton{
    color: #000000;
    background-color: #f7ffb2;
    border-radius: 100vh;
  }
  .myYellowButton:hover {
    color: #000000;
    background: #f7ffb2;
  }
  /* === フィルタグリッド === */
  .filter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;  /* 2列 */
    grid-template-rows: auto auto auto auto; /* 4行 */
    gap: 4px 8px;                  /* 縦横の隙間 */
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 5px;
  }

  /* 各labelをブロック化して均等に伸ばす */
  .filter-grid label {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 6px;
    font-size: 14px;
    flex-wrap: wrap;
    width: 100%;
    background: #f9f9f9;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid #ddd;
  }

  /* select / input のサイズ調整 */
  .filter-grid select,
  .filter-grid input[type="date"] {
    font-size: 14px;
    padding: 3px 5px;
  }

  /* リセットボタンセルを右下に配置 */
  .reset-cell {
    grid-column: 1 / span 2;  /* 2列分をまたぐ */
    text-align: right;
    padding-top: 4px;
  }


  /* === 色フィルタセレクトの基本スタイル === */
  #colorFilterSelect-0 {
    transition: background-color 0.3s ease;
    font-weight: bold;
    border-radius: 6px;
    border: 1px solid #aaa;
  }
  /* 各色ごとの背景（クラスで付け替える） */
  .color-filter-red {
    background-color: #f08080 !important;
  }
  .color-filter-green {
    background-color: #90ee90 !important;
  }
  .color-filter-white {
    background-color: #ffffff !important;
  }
  .color-filter-all {
    background-color: #f0f0f0 !important;
  }





  /* ---------------- サマリーテーブル ---------------- */
  .color-count-table {
    border-collapse: collapse;
    margin-right: 10px;
    font-size: 12px;
  }

  .color-count-table td {
    border: 1px solid #ccc;
    padding: 3px 6px;
    text-align: center;
    border-radius: 4px;
  }

  .green-count-cell { background: #90ee90; }
  .red-count-cell   { background: #f08080; }
  .white-count-cell { background: #ffffff; }
  .blue-count-cell  { background: #add8e6; }




  /* ---------------- ステータステーブル ---------------- */
  .status-table-container {
    max-height: 200px;
    overflow-y: auto;
    border: 1px solid #aaa;
    border-radius: 8px;
  }

  #statusTableContainer {
    overflow-y: auto;

  }
  .status-table {
    border-collapse: collapse;
    width: 100%;
    font-size: 14px;
    overflow-y: auto;
  }

  .status-table td {
    padding: 6px;
    border: 1px solid #000;
    text-align: center;
    position: relative;
    min-width: 60px;

  }

  .status-table .wrong-count { position: absolute; right: 4px; top: 2px; font-size: 12px; color: red; }
  .correct-count { position: absolute; left: 4px; top: 2px; font-size: 12px; color: green; }
  .weight-display { position: absolute; left: 15%; top: 2px; font-size: 12px; color: gray; }
  .last-review { position: absolute; left: 35%; top: 2px; font-size: 12px; color: gray; }


  .blue { background-color: #add8e6; }
  .green { background-color: #90ee90; }
  .red { background-color: #f08080; }



  /* ---------------- レスポンシブ ---------------- */
  @media (max-width: 768px) {
    .question-area, .answer-area { font-size: 16px; min-height: 40px; padding: 6px;  }
    select { font-size: 14px; padding: 4px 5px; }
    .myButtonBlue, .myButtonGreen, .myButtonRed { font-size: 16px; padding: 0.35em 0.7em; }
    .floating-buttons { right: 50%; transform: translateX(50%); flex-direction: row; gap: 8px; }
    .status-table td { font-size: 12px; min-width: 50px; padding: 5px; }
    .filter-grid {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
    }
    .reset-cell {
      text-align: center;
    }
  }




</style>
</head>

function isKanji(str) {
  return /[\u4E00-\u9FFF]/.test(str);
}

// 変換関数（最終版）
function isKanji(str) {
  return /[\u4E00-\u9FFF]/.test(str);
}
function isHiragana(ch) {
  return /[\u3040-\u309F]/.test(ch);
}



function transformAnswerToQuestion(text) {
  let out = String(text);

  // 1) カタカナ見出し行を削除
  out = out.replace(
    /(^|\n)[ \t　]*[ァ-ヶー]+([、，][ァ-ヶー]+)*[ \t　]*(?=\n|$)/g,
    "$1"
  );

  // 2) 送り仮名（ひらがな1字 + (ひらがな1字)）
  out = out.replace(
    /([\u3040-\u309F])[\(\（]([\u3040-\u309F])[\)\）]/g,
    "$1○"
  );

  // 3) 漢字語の読み括弧削除（仮名全般対応）
  out = out.replace(
    /([\u4E00-\u9FFF][^\n\(\（]*)[\(\（][\u3040-\u30FFー]+([、，][\u3040-\u30FFー]+)*[\)\）]/g,
    "$1"
  );

  // 4) ※行の括弧全削除
  out = out
    .split("\n")
    .map(line => {
      if (/^[ \t　]*※/.test(line)) {
        return line.replace(/[\(\（][^\)\）]*[\)\）]/g, "");
      }
      return line;
    })
    .join("\n");

  // 5) 残り括弧保護
  const placeholders = [];
  out = out.replace(/[\(\（][^\)\）]*[\)\）]/g, (m) => {
    const token = `@@P${placeholders.length}@@`;
    placeholders.push(m);
    return token;
  });

  // 6) 行全体ひらがなだけマスク
  out = out
    .split("\n")
    .map(line => {

      if (/^[ \t　]*※/.test(line)) return line;

      const trimmed = line.trim();

      if (/^[\u3040-\u309F]+([、，][\u3040-\u309F]+)*$/.test(trimmed)) {
        return line.replace(/([\u3040-\u309F]+)/g, m =>
          m[0] + "○".repeat(m.length - 1)
        );
      }

      return line;
    })
    .join("\n");

  // 7) カタカナ単語行マスク
  out = out.replace(
    /(^|\n)([ \t　]*)([ァ-ヶー]{2,})(?=\n|$)/g,
    (_, br, indent, word) =>
      br + indent + word[0] + "○".repeat(word.length - 1)
  );

  // 8) 括弧復元
  placeholders.forEach((orig, i) => {
    out = out.replace(`@@P${i}@@`, orig);
  });

  return out.trim();
}

// クイズ作成
function createQuiz(blockId, data) {

    let remaining = [];
    let previousHighlightedId = null; // 前回青くしたセルのIDを保存

        for (let i = 0; i <= 100; i++) {

          opt.value = i;
          opt.textContent = i;

        }
        excludeWrongSelect.value = localStorage.getItem(`excludeWrongSelect-${blockId}`) ?? 100;
        document.getElementById(`excludeWrongCond-${blockId}`).value =

        }

        document.getElementById(`excludeWeightCond-${blockId}`).value =
          localStorage.getItem(`excludeWeightCond-${blockId}`) ?? "none";

        document.getElementById(`excludeLastReviewDate-${blockId}`).value =
          localStorage.getItem(`excludeLastReviewDate-${blockId}`) ?? "";
        document.getElementById(`excludeLastReviewCond-${blockId}`).value =
          localStorage.getItem(`excludeLastReviewCond-${blockId}`) ?? "none";



        startSelect.value = localStorage.getItem(`startSelect-${blockId}`) ?? data[0].id;
        endSelect.value = localStorage.getItem(`endSelect-${blockId}`) ?? data[data.length - 1].id;
        // excludeCorrectSelect.value = localStorage.getItem(`excludeCorrectSelect-${blockId}`) ?? 100;



        loadWrongCounts();
        loadCorrectCounts();
        loadWeights();
        loadLastReviews();
        buildTable();
        resetState();
        loadCellColors(); // ← 最後に追加
        updateDeleteOptions(blockId);
    }
  
    // テーブル作成
    function buildTable() {
      statusTable.innerHTML = '';
      statusMap.clear();
      const sortedData = getSortedData(); 
      const rowHeight = 500 / data.length + 'px'; 

      sortedData.forEach(d => { 
        const row = statusTable.insertRow(); 
        const cell = row.insertCell(); 
        cell.textContent = d.label; 
        row.style.height = rowHeight; 
        cell.style.position = "relative"; 
        const wrongCount = wrongCounts.get(d.id) ?? 0; 
        const correctCount = correctCounts.get(d.id) ?? 0; // weight計算は削除！代わりに localStorage から読む 
        const savedWeight = weights.get(d.id) ?? "";

        // weight表示 
        const weightSpan = document.createElement("span"); 
        weightSpan.className = "weight-display";
        weightSpan.textContent = savedWeight;// ← localStorageの値をそのまま表示 
        cell.appendChild(weightSpan);

        wrongSpan.className = "wrong-count"; 
        wrongSpan.textContent = `×${wrongCount}`; 
        cell.appendChild(wrongSpan);

        correctSpan.className = "correct-count"; 
        correctSpan.textContent = `○${correctCount}`; 
        cell.appendChild(correctSpan);

          cell.appendChild(reviewSpan); 
        } 
        
        statusMap.set(d.id, { cell, wrongSpan, correctSpan, weightSpan }); 
        
        if (lastBlueId !== null && lastBlueId === d.id) { 
          cell.className = ''; 
          cell.classList.add('blue'); 
        } 
      }); 
      
      loadCellColors(); 
      updateColorCount(); // ← 追加
    } 
    
    // 問題文・答えリセット 
    function resetState() { 
      remaining = []; 
      currentId = null; 
      lastBlueId = null; 
      questionArea.textContent = "ここに問題文が表示されます"; 
      answerArea.textContent = "ここに答えが表示されます";

    // 正解・不正解数をリセットボタンを押したとき

        wrongCounts.clear();
        correctCounts.clear();

        localStorage.removeItem(`wrongCounts-${blockId}`);

        // テーブル再描画
        buildTable();
    });

    // ボタンを使えないようにする
    function setButtonsEnabled(enabled) {
        showAnswerBtn.disabled = !enabled;
        correctBtn.disabled = !enabled;
        wrongBtn.disabled = !enabled;
    }

    function updateColorCount() {
      const table = document.getElementById(`statusTable-${blockId}`);
      const greenCells = table.querySelectorAll('.green').length;
      const redCells   = table.querySelectorAll('.red').length;
      const blueCells  = table.querySelectorAll('.blue').length;

      // 白セル = すべてのセル数 - 他の色セル
      const allCells = table.querySelectorAll('td').length;
      const whiteCells = allCells - (greenCells + redCells + blueCells);

      greenCountEl.textContent = greenCells;
      redCountEl.textContent   = redCells;
      blueCountEl.textContent  = blueCells;
      whiteCountEl.textContent = whiteCells;

    }







    function getRangeData() {
      
      const start = parseInt(document.getElementById(`startSelect-${blockId}`).value);
      const end = parseInt(document.getElementById(`endSelect-${blockId}`).value);

      const excludeCorrect = parseInt(document.getElementById(`excludeCorrectSelect-${blockId}`).value);
      const excludeCorrectCond = document.getElementById(`excludeCorrectCond-${blockId}`).value;

      const excludeWrong = parseInt(document.getElementById(`excludeWrongSelect-${blockId}`).value);
      const excludeWrongCond = document.getElementById(`excludeWrongCond-${blockId}`).value;

      const excludeWeight = parseFloat(document.getElementById(`excludeWeightSelect-${blockId}`).value);
      const excludeWeightCond = document.getElementById(`excludeWeightCond-${blockId}`).value;

      const excludeLastReviewDate = document.getElementById(`excludeLastReviewDate-${blockId}`).value;
      const excludeLastReviewCond = document.getElementById(`excludeLastReviewCond-${blockId}`).value;

      // ✅ まずは既存条件で範囲抽出
      let rangeData = data.filter(d => {
        if (d.id < start || d.id > end) return false;

        // 正解数フィルタ
        const correct = correctCounts.get(d.id) ?? 0;
        if (excludeCorrectCond !== "none") {
            if (excludeCorrectCond === "lt" && correct <= excludeCorrect) return false;
            if (excludeCorrectCond === "gt" && correct >= excludeCorrect) return false;
        }

        // 誤答数フィルタ
        const wrong = wrongCounts.get(d.id) ?? 0;
        if (excludeWrongCond !== "none") {
            if (excludeWrongCond === "lt" && wrong <= excludeWrong) return false;
            if (excludeWrongCond === "gt" && wrong >= excludeWrong) return false;
        }

        // weight フィルタ
        const weight = parseFloat(weights.get(d.id) ?? 0);
        if (excludeWeightCond !== "none") {
            if (excludeWeightCond === "lt" && weight <= excludeWeight) return false;
            if (excludeWeightCond === "gt" && weight >= excludeWeight) return false;
        }

        // lastReview フィルタ
        if (excludeLastReviewCond !== "none" && excludeLastReviewDate) {
          const reviewDate = new Date(lastReviews.get(d.id) ?? 0);
          const condDate = new Date(excludeLastReviewDate);
          if (excludeLastReviewCond === "before" && reviewDate <= condDate) return false;
          if (excludeLastReviewCond === "after" && reviewDate >= condDate) return false;
        }

        return true;
      });

      // ✅ ここからセル色フィルタを追加
      const colorFilterSelect = document.getElementById(`colorFilterSelect-${blockId}`);
      if (colorFilterSelect) {
        const colorChoice = colorFilterSelect.value; // "all", "green", "red", "white"
        const savedColors = JSON.parse(localStorage.getItem(`cellColors-${blockId}`) || '{}');

        if (colorChoice === "green" || colorChoice === "red") {
          rangeData = rangeData.filter(item => savedColors[item.id] === colorChoice);
        } else if (colorChoice === "white") {
          rangeData = rangeData.filter(item => !savedColors[item.id]);
        }
        // "all" の場合はフィルタしない
      }

      return rangeData;
    }



    // 出題
    function pickQuestion() {
        if (remaining.length === 0) {
            // console.log("本日出題済みの問題しか残っていません。");
            questionArea.textContent = "おわり！";
            answerArea.textContent = "";
            setButtonsEnabled(false);
            return;
        }


        const now = new Date();
        const weights = remaining.map(d => {
            const wrongCount = wrongCounts.get(d.id) ?? 0;
            const correctCount = correctCounts.get(d.id) ?? 0;

            const now = new Date();
            const days = d.lastReview ? Math.floor((now - new Date(d.lastReview)) / (1000 * 60 * 60 * 24)) : 365;
            const base = (wrongCount + 1) / (correctCount + 1);
            const timeFactor = 1 - Math.exp(-days / (5 * (correctCount + 1)));
            const timeScale = 2.0;
            const jitter = 1 + (Math.random() - 0.5) * 0.1;
            const lowCorrectBoost = 0.12 * (1 / (correctCount + 1));
            const weight = (base * (1 + timeFactor * timeScale) * jitter * (1 + lowCorrectBoost)).toFixed(2);




            return Math.round(weight * 100) / 100;

        });

        const totalWeight = weights.reduce((a, b) => a + b, 0);
        let r_b = Math.random();
        let r = r_b * totalWeight;
        let index = 0;
        for (let i = 0; i < weights.length; i++) {
            r -= weights[i];
            // console.log("r", r, "index", i)
            if (r <= 0) {
                index = i;
                break;
            }
        }

        const item = remaining.splice(index, 1)[0];
        currentId = item.id;
        item.lastReview = now; // 出題時に更新

        let styledQuestion = colorizeNestedParentheses(item.question)
          .replace(/【(.*?)】|{(.*?)}/g, (match, p1, p2) => {
            if (p1 !== undefined) {
              return `<span style="color: red; font-weight: bold;">【${p1}】</span>`;
            }
            if (p2 !== undefined) {
              let inner = p2.replace(/【(.*?)】/g, '<span style="color: red; font-weight: bold;">【$1】</span>');
              return `<span style="color: blue; font-weight: bold; text-decoration: underline;">{${inner}}</span>`;
            }
            return match;
          });

        questionArea.innerHTML = `<span style="color: black;">${styledQuestion}</span>`;
        answerArea.innerHTML = `<span style="color: gray;">ここに答えが表示されます</span>`;
        highlightCell(item.id, 'blue');
        setButtonsEnabled(true);

        if (window.MathJax) MathJax.typesetPromise([questionArea]);
    }





    function scrollCellIntoView(cell) {
      if (!cell) return;

      // セルに最も近いスクロール可能な親を探す（テンプレート複製などでも安全）
      const container = cell.closest('.status-table-container') || document.getElementById('statusTableContainer');
      if (!container) return;

      // 安全チェック
      if (typeof container.getBoundingClientRect !== 'function' || typeof cell.getBoundingClientRect !== 'function') return;

      const cellRect = cell.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();

      const absoluteTopInContainer = container.scrollTop + (cellRect.top - containerRect.top);

      const targetScrollTop = Math.round( absoluteTopInContainer - (container.clientHeight - cellRect.height) / 2 );

      const maxScrollTop = Math.max(0, container.scrollHeight - container.clientHeight);
      const boundedTop = Math.min(Math.max(0, targetScrollTop), maxScrollTop);

      container.scrollTo({
        top: boundedTop,
        behavior: 'auto' // または 'smooth'
      });
    }

    function highlightCell(id, className) {
      // 前回青セルを元に戻す
      if (className === 'blue' && lastBlueId !== null && lastBlueId !== id) {
        restoreCellClass(lastBlueId);
      }
      const entry = statusMap.get(id);
      if (!entry) return;

      entry.cell.className = '';

      if (className) {
        entry.cell.classList.add(className);

        if (className !== 'blue') {
          saveCellColor(id, className);
          lastBlueId = null;
        } else {
          lastBlueId = id;

          requestAnimationFrame(() => {
            scrollCellIntoView(entry.cell);
          });
        }
      } else {
        removeCellColor(id);
        if (lastBlueId === id) lastBlueId = null;
      }
    }

    function restoreCellClass(id) {
      const entry = statusMap.get(id);
      if (!entry) return;

      entry.cell.className = '';
      const savedClass = getSavedCellColor(id); // ← 1件取得に変更
      if (savedClass) {
        entry.cell.classList.add(savedClass);
      }
    }

    function saveCellColor(id, className) {
        if (className !== "blue"){
            const key = `cellColors-${blockId}`;
            const saved = localStorage.getItem(key);
            const colors = saved ? JSON.parse(saved) : {};
            colors[id] = className;
            localStorage.setItem(key, JSON.stringify(colors));
        }
    }

    function removeCellColor(id) {
        const key = `cellColors-${blockId}`;
        const saved = localStorage.getItem(key);
        if (saved) {
            const colors = JSON.parse(saved);
            delete colors[id];
            localStorage.setItem(key, JSON.stringify(colors));
        }
    }

    function loadCellColors() {
        const key = `cellColors-${blockId}`;
        const saved = localStorage.getItem(key);
        if (saved) {
            const colors = JSON.parse(saved);
            for (const [idStr, className] of Object.entries(colors)) {
            const id = parseInt(idStr);
            const entry = statusMap.get(id);
            if (entry) {
                entry.cell.classList.add(className);
            }
            }
        }

        if (lastBlueId !== null) {
            const entry = statusMap.get(lastBlueId);
            if (entry) {

            }
        }
    }

    function getSavedCellColor(id) {
      const key = `cellColors-${blockId}`;

    }

    function saveCorrectCounts() {

    function loadCorrectCounts() {

        if (saved) {
            const obj = JSON.parse(saved);
            for (const [idStr, count] of Object.entries(obj)) {

                correctCounts.set(id, count);

                // カウントを表示
                const entry = statusMap.get(id);
                if (entry && entry.correctSpan) {
                    entry.correctSpan.textContent = `○${count}`;
                }
            }

    }
    function saveWeights() {

        for (const [id, weight] of weights.entries()) {
            obj[id] = weight;
        }

    function loadWeights() {

    function saveLastReviews() {

    // 出題範囲の値が変わったら保存
    startSelect.addEventListener('change', () => {

    function updateRemainingCount() {
      remainingCountLabel.textContent = `残り: ${remaining.length}問`;
    }

    function colorizeParentheses(text) {
      const colors = [
        "#FFA500", // 濃いオレンジ
        "#FFB733", // 少し薄い
        "#FFCC80", // さらに薄い
        "#FFE0B3"  // もっと薄い（必要なら増やす）
      ];

      let result = "";
      let depth = 0;

      for (let char of text) {
        if (char === "(" || char === "（") {
          const color = colors[Math.min(depth, colors.length - 1)];
          result += `<span style="color: ${color};">` + char;
          depth++;
        } else if (char === ")" || char === "）") {
          depth = Math.max(0, depth - 1);
          result += char + "</span>";
        } else {
          result += char;
        }
      }

      return result;
    }

    // 答えを見るボタンを押したとき
    showAnswerBtn.addEventListener('click', () => {
        if (currentId !== null) {
            const item = data.find(d => d.id === currentId);
            // answerArea.innerHTML = `<span style="color: black;">${item.answer}</span>`;

          let styledAnswer = colorizeNestedParentheses(item.answer)
            .replace(/【(.*?)】|{(.*?)}/g, (match, p1, p2) => {
              if (p1 !== undefined) return `<span style="color: red; font-weight: bold;">【${p1}】</span>`;
              if (p2 !== undefined) {
                let inner = p2.replace(/【(.*?)】/g, '<span style="color: red; font-weight: bold;">【$1】</span>');
                return `<span style="color: blue; font-weight: bold; text-decoration: underline;">{${inner}}</span>`;
              }
              return match;
            });

          // 全体黒で囲む
          answerArea.innerHTML = `<span style="color: black;">${styledAnswer}</span>`;
        }
        
        // MathJaxで数式を再描画
        if (window.MathJax) {
            MathJax.typesetPromise([answerArea]);
        }
    });
    // 正解したボタンを押したとき
    correctBtn.addEventListener('click', () => {
        if (currentId !== null) {
            const entry = statusMap.get(currentId);
            const newCount = (correctCounts.get(currentId) ?? 0) + 1;
            correctCounts.set(currentId, newCount);

            if (entry && entry.correctSpan) {
            entry.correctSpan.textContent = `○${newCount}`;
            }

            // lastReview を更新して保存
            const nowIso = new Date().toISOString();
            lastReviews.set(currentId, nowIso);
            if (entry && entry.lastReviewSpan) entry.lastReviewSpan.textContent = new Date(nowIso).toLocaleString("ja-JP");
            saveLastReviews();

            // <-- ここで newWeight を「必ず」計算する（未定義参照の防止）
            const wrong = wrongCounts.get(currentId) ?? 0;
            const corr = newCount;
            // days は lastReviews を元に計算（今更新したので 0 日）
            const days = 0;
            const base = (wrong + 1) / (corr + 1);
            const timeFactor = 1 - Math.exp(-days / (5 * (corr + 1)));
            const timeScale = 2.0;
            const jitter = 1 + (Math.random() - 0.5) * 0.1;
            const lowCorrectBoost = 0.12 * (1 / (corr + 1));
            const newWeight = Number((base * (1 + timeFactor * timeScale) * jitter * (1 + lowCorrectBoost)).toFixed(2));

            weights.set(currentId, newWeight);
            if (entry && entry.weightSpan) entry.weightSpan.textContent = newWeight;
            saveWeights();

            questionArea.scrollTop = 0;

            updateRemainingCount(); // ← 残り更新
            highlightCell(currentId, 'green');
            saveCorrectCounts();
            pickQuestion();
            updateColorCount(); // ← 追加
        }
    });
    // 不正解だったボタンを押したとき
    wrongBtn.addEventListener('click', () => {
        if (currentId !== null) {
            const entry = statusMap.get(currentId);
            const newCount = (wrongCounts.get(currentId) ?? 0) + 1;
            wrongCounts.set(currentId, newCount);

            if (entry && entry.wrongSpan) {
            entry.wrongSpan.textContent = `×${newCount}`;
            }

            // lastReview を更新して保存
            const nowIso = new Date().toISOString();
            lastReviews.set(currentId, nowIso);
            if (entry && entry.lastReviewSpan) entry.lastReviewSpan.textContent = new Date(nowIso).toLocaleString("ja-JP");
            saveLastReviews();

            // newWeight を計算して保存
            const wrong = newCount;
            const corr = correctCounts.get(currentId) ?? 0;
            const days = 0;
            const base = (wrong + 1) / (corr + 1);
            const timeFactor = 1 - Math.exp(-days / (5 * (corr + 1)));
            const timeScale = 2.0;
            const jitter = 1 + (Math.random() - 0.5) * 0.1;
            const lowCorrectBoost = 0.12 * (1 / (corr + 1));
            const newWeight = Number((base * (1 + timeFactor * timeScale) * jitter * (1 + lowCorrectBoost)).toFixed(2));

            weights.set(currentId, newWeight);
            if (entry && entry.weightSpan) entry.weightSpan.textContent = newWeight;
            saveWeights();
            
            questionArea.scrollTop = 0;

            updateRemainingCount(); // ← 残り更新
            highlightCell(currentId, 'red');
            saveWrongCounts();
            pickQuestion();
            updateColorCount(); // ← 追加
        }
    });

    function updateColorFilterBackground() {
      // まず既存クラスを全削除
      colorFilterSelect.classList.remove(
        'color-filter-red',
        'color-filter-green',
        'color-filter-white',
        'color-filter-all'
      );

      // 現在の値に応じてクラスを追加
      const value = colorFilterSelect.value;
      if (value === 'red') {
        colorFilterSelect.classList.add('color-filter-red');
      } else if (value === 'green') {
        colorFilterSelect.classList.add('color-filter-green');
      } else if (value === 'white') {
        colorFilterSelect.classList.add('color-filter-white');
      } else {
        colorFilterSelect.classList.add('color-filter-all');
      }
    }

    // 初期状態の反映
    updateColorFilterBackground();

    // 変更イベント時に反映
    // colorFilterSelect.addEventListener('change', updateColorFilterBackground);

    // 3) 選択が変わったら localStorage に保存して自動適用（apply 不要）
    //    さらに、現在のフィルタで残り件数を更新しておく
    colorFilterSelect.addEventListener('change', (e) => {
      const v = e.target.value;
      localStorage.setItem(`colorFilterSelect-${blockId}`, v);
      updateColorFilterBackground();

      // 再取得して残り件数を更新（ユーザがすぐ「出題」を押さなくても見た目上の残りを反映）
      const rangeData = getRangeData();
      remaining = rangeData.slice();
      updateRemainingCount();
      updateColorCount();
    });



    init();






}




async function fetchQuizData() {
  const url = "https://docs.google.com/spreadsheets/d/1dI707hCw7dCo4CaBrNR4Z23y_c1fBu4hImpRLNuq_rA/gviz/tq?tqx=out:json";

  const response = await fetch(url);
  const text = await response.text();

  // Google独自フォーマットを除去
  const json = JSON.parse(text.substr(47).slice(0, -2));

  return json.table.rows.map(row => ({
    id: row.c[0]?.v,
    category: row.c[1]?.v,
    label: row.c[2]?.v,
    question: row.c[3]?.v,
    answer: row.c[4]?.v
  }));
}

function colorizeNestedParentheses(text) {
  const colors = [
    "#ff7f00", //オレンジ
    "#00ff7f", //薄い青緑

  ];
  let result = "";
  let depth = 0;

  for (let char of text) {
    if (char === "(" || char === "（") {
      const color = colors[Math.min(depth, colors.length - 1)];
      result += `<span style="color: ${color};">${char}`;
      depth++;
    } else if (char === ")" || char === "）") {
      depth = Math.max(0, depth - 1);
      result += `${char}</span>`;   // ← char の後に閉じる
    } else {
      result += char;
    }
  }

  return result;
}
